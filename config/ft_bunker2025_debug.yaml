run_name: ft_bunker2025_debug

# Fine-tuning from pretrained CDiT-XL checkpoint — LOCAL DEBUG (15 GB GPU)
from_checkpoint: checkpoint/cdit_xl_ego4d_200000.pth.tar
finetune_mode: True

# training setup — small values for local testing
results_dir: logs
batch_size: 2        # fits in 15 GB with bfloat16
num_workers: 2
model: CDiT-XL/2
lr: 2e-5

normalize: True
grad_clip_val: 10.0
context_size: 4

distance:
  min_dist_cat: -64
  max_dist_cat: 64

len_traj_pred: 64
image_size: 224

datasets:
  bunker2025:
    data_folder: data/bunker2025
    train: data_splits/bunker2025/train
    test: data_splits/bunker2025/test
    goals_per_obs: 4
